<!DOCTYPE html>
<html>
<head>
  <title>Vocabulary</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 90vh;
      color: #333;
      text-align: center;
      position: relative;
    }

    #lineWrapper {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      width: 90%;
      height: 100%;
    }

    #word {
      font-size: 50px;
      font-weight: 500;
      margin-bottom: 30px;
    }

    #examples {
      font-size: 30px;
      color: grey;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    #bottomBar {
      position: absolute;
      bottom: 5px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 20px;
      font-size: 14px;
    }

    #lineNumber {
      display: inline-block;
      height: 26px;
      line-height: 26px;
      text-align: center;
      font-size: 14px;
      width: 80px;
    }

    #letterFilter, #delayInput, #shuffleDropdown {
      height: 26px;
      padding: 4px;
      border: none;
      text-align: center;
      font-size: 14px;
      width: 80px;
    }
  </style>
</head>

<body>
  <div id="lineWrapper">
    <div id="word">Loading...</div>
    <div id="examples"></div>
  </div>

  <div id="bottomBar">
    <span id="lineNumber"></span>

    <select id="letterFilter">
      <option value="-">-</option>
      <script>
        for (let i = 97; i <= 122; i++) {
          document.write(`<option value="${String.fromCharCode(i)}">${String.fromCharCode(i)}</option>`);
        }
      </script>
    </select>

    <select id="delayInput">
      <option value="0" selected>0</option>
      <option value="2">2</option>
      <option value="6">6</option>
      <option value="9">9</option>
    </select>

    <select id="shuffleDropdown">
      <option value="no" selected>No</option>
      <option value="yes">Yes</option>
    </select>
  </div>

  <script>
    let lines = [];
    let filtered = [];

    let index = 0;
    let interval = null;

    const wordDisplay = document.getElementById("word");
    const examplesDisplay = document.getElementById("examples");
    const lineNumberDisplay = document.getElementById("lineNumber");

    const delayInput = document.getElementById("delayInput");
    const letterFilter = document.getElementById("letterFilter");
    const shuffleDropdown = document.getElementById("shuffleDropdown");

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function getDelay() {
      return parseInt(delayInput.value, 10);
    }

    function isShuffleEnabled() {
      return shuffleDropdown.value === "yes";
    }

    function showLine() {
      if (!filtered.length) return;

      if (index >= 0 && index < filtered.length) {
        const parts = filtered[index]
          .split(".")
          .map(w => w.trim())
          .filter(w => w);

        const [head, ...examples] = parts;

        wordDisplay.textContent = head || "";
        examplesDisplay.innerHTML = examples.map(e => `<div>${e}</div>`).join("");
        lineNumberDisplay.textContent = `${index + 1}/${filtered.length}`;
        document.title = head || "";
      }
    }

    function start() {
      if (!filtered.length) return;

      const delay = getDelay();

      if (interval) clearInterval(interval);

      if (delay === 0) return;

      interval = setInterval(() => {
        index++;
        if (index < filtered.length) {
          showLine();
        } else {
          clearInterval(interval);
          interval = null;
        }
      }, delay * 1000);
    }

    function applyFilter() {
      if (!lines.length) return;

      const selectedLetter = letterFilter.value;

      let newFiltered =
        selectedLetter === "-"
          ? [...lines]
          : lines.filter(l => l[0]?.toLowerCase() === selectedLetter);

      filtered = isShuffleEnabled() ? shuffle(newFiltered) : newFiltered;

      index = 0;
      showLine();
      start();
    }

    function prevLine() {
      if (index > 0) {
        index--;
        showLine();
      }
    }

    function nextLine() {
      if (index < filtered.length - 1) {
        index++;
        showLine();
      }
    }

    document.addEventListener("keydown", e => {
      if (e.code === "ArrowLeft" || e.code === "PageUp") prevLine();
      else if (e.code === "ArrowRight" || e.code === "PageDown") nextLine();
    });

    document.addEventListener("touchend", e => {
      const touchX = e.changedTouches[0].clientX;
      const midPoint = window.innerWidth * 0.5;

      if (touchX < midPoint) prevLine();
      else nextLine();
    });

    delayInput.addEventListener("change", start);
    letterFilter.addEventListener("change", applyFilter);
    shuffleDropdown.addEventListener("change", applyFilter);

    // ✅ LOAD words.txt
    fetch("words.txt")
      .then(res => res.text())
      .then(text => {
        lines = text.split(/\r?\n/).filter(x => x.trim());

        applyFilter(); // start app
      })
      .catch(err => {
        wordDisplay.textContent = "Failed to load words.txt";
        console.error(err);
      });
  </script>
</body>
</html>
